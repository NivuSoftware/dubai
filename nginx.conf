# Redirect HTTP → HTTPS (SEO: evita contenido duplicado y mejora el ranking)
server {
  listen 80;
  listen [::]:80;
  server_name dubaiec.net www.dubaiec.net;

  # Certbot challenge (necesario para renovar SSL)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Todo lo demás redirige a HTTPS con 301 permanente
  location / {
    return 301 https://dubaiec.net$request_uri;
  }
}

# Servidor HTTPS principal
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name dubaiec.net;

  # --- SSL (certificados generados con certbot) ---
  ssl_certificate     /etc/letsencrypt/live/dubaiec.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dubaiec.net/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # --- Tamaño máximo de subidas ---
  client_max_body_size 50m;

  # --- Compresión gzip (mejora Core Web Vitals y velocidad de carga) ---
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # --- Headers de seguridad (evitan penalizaciones y mejoran confianza) ---
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # --- Caché para assets estáticos (mejora LCP y velocidad percibida) ---
  location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg|mp4|webm)$ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # --- Sitemap dinámico (generado por el backend con todos los perfiles) ---
  location = /sitemap.xml {
    proxy_pass http://127.0.0.1:5000/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600";
  }

  # --- API backend ---
  location ^~ /api/ {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- Frontend React SPA ---
  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

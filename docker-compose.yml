services:
  postgres:
    image: postgres:16-alpine
    container_name: dubai-postgres
    restart: always
    environment:
      POSTGRES_DB: dubai_db
      POSTGRES_USER: dubai_user
      POSTGRES_PASSWORD: dubai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dubai_user -d dubai_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dubai-network

  backend:
    image: dubai-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dubai-backend
    env_file:
      - ./backend/.env
    environment:
      FLASK_APP: app
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - modelos_data:/app/modelos
      - anuncios_data:/app/anuncios
      - verification_requests_data:/app/verification_requests
    command:
      [
        "sh",
        "-c",
        "flask --app app db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 3 --timeout 120 --forwarded-allow-ips='*' 'app:app'",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - dubai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dubai-frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: always
    networks:
      - dubai-network

networks:
  dubai-network:
    driver: bridge

volumes:
  postgres_data:
  modelos_data:
  anuncios_data:
  verification_requests_data:
